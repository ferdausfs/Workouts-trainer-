workflows:
  pulsefit-android-release:
    name: PulseFit AI Android Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: 3.19.6
      java: 17
      groups:
        - keystore_credentials # CM_KEYSTORE, CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD
        - google_play          # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      vars:
        PACKAGE_NAME: "com.pulsefit.ai"
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Set up keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/upload-keystore.jks
          cat > "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_BUILD_DIR/upload-keystore.jks
          EOF
      - name: Get dependencies
        script: flutter pub get
      - name: Run static analysis
        script: flutter analyze --no-fatal-infos || true
      - name: Run tests
        script: flutter test || true
      - name: Build AAB (Play Store)
        script: flutter build appbundle --release
      - name: Build APK (split-per-abi)
        script: flutter build apk --release --split-per-abi
    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - team@pulsefit.ai
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
