name: pulsefit_ai
description: PulseFit AI - Personal AI-powered fitness platform (offline, no cloud)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.0.0

  # UI / Animations
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  cached_network_image: ^3.3.1
  flutter_staggered_animations: ^1.1.1
  animations: ^2.0.11

  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Network (kept for optional features - exercise images caching)
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Media / Sensors
  video_player: ^2.8.6
  audioplayers: ^6.0.0
  flutter_local_notifications: ^17.1.2
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.4.0
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0A0E27"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

flutter_native_splash:
  color: "#0A0E27"
  image: assets/images/splash_logo.png
  android_12:
    image: assets/images/splash_logo.png
    color: "#0A0E27"
