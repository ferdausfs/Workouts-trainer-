name: pulsefit_ai
description: Rebuilt and optimized offline-first fitness app.
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: '#0A0E27'
  adaptive_icon_foreground: assets/icons/app_icon_foreground.png

flutter_native_splash:
  color: '#0A0E27'
  image: assets/images/splash_logo.png
  android_12:
    image: assets/images/splash_logo.png
    color: '#0A0E27'
